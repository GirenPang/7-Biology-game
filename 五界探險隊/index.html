<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五界生物探險隊</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ng:#39ff90;--nb:#00cfff;--np:#c77dff;--nr:#ff4d6d;--ny:#ffe066;
  --bg:#0d0d1a;--card:#13132b;--dim:rgba(100,100,200,0.22);
  --fs:1.3; /* 放大係數 */
}
html{font-size:20.8px;} /* 16px × 1.3 */
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:#f0f0ff;min-height:100vh;overflow-x:hidden;transition:background .15s;}
body.flash-good{animation:fgood .4s ease;}
body.flash-bad{animation:fbad .4s ease;}
body.time-alert{animation:tpulse .85s ease-in-out infinite;}
@keyframes fgood{0%,100%{filter:none;}45%{filter:brightness(1.12) saturate(1.3);}}
@keyframes fbad{0%,100%{filter:none;}45%{filter:sepia(.2) saturate(1.4);}}
@keyframes tpulse{0%,100%{box-shadow:inset 0 0 0 rgba(255,77,109,0);}50%{box-shadow:inset 0 0 0 13px rgba(255,77,109,.18);}}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none;}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(10,10,28,.97);border-bottom:2px solid var(--dim);padding:10px 24px;display:flex;justify-content:center;gap:36px;flex-wrap:wrap;backdrop-filter:blur(8px);}
.hi{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hl{font-size:0.65rem;color:#9090cc;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.hv{font-size:1.25rem;font-weight:900;}
.hv.g{color:var(--ng);}.hv.b{color:var(--nb);}.hv.r{color:var(--nr);}.hv.y{color:var(--ny);}
.hud .time-low .hv{color:var(--nr);}

/* Screens */
.wrap{max-width:900px;margin:0 auto;padding:90px 20px 50px;}
.screen{display:none;animation:fadein .25s ease;}
.screen.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* Start screen */
.brand-badge{display:inline-block;background:rgba(57,255,144,.12);border:2px solid var(--ng);color:var(--ng);font-size:0.75rem;letter-spacing:2px;padding:5px 18px;border-radius:20px;margin-bottom:16px;font-weight:700;}
.title-main{font-size:2.4rem;font-weight:900;background:linear-gradient(135deg,var(--nb),var(--np));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.title-sub{font-size:0.9rem;color:#aaaadd;margin-top:10px;line-height:1.8;}
.bio-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.bio-tag{border:1px solid rgba(200,200,255,0.3);background:rgba(255,255,255,.06);color:#d0d0ee;border-radius:20px;padding:6px 14px;font-size:0.8rem;font-weight:700;}
.sec-label{font-size:0.72rem;letter-spacing:2px;color:#9090cc;text-transform:uppercase;margin:24px 0 12px;font-weight:700;}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px;}
.mode-card,.level-card{background:var(--card);border:2px solid var(--dim);border-radius:14px;padding:20px 16px;cursor:pointer;text-align:left;transition:.18s;}
.mode-card:hover{border-color:var(--nb);transform:translateY(-2px);}
.mode-card.sel{border-color:var(--nb);background:rgba(0,207,255,.09);}
.level-card:hover{border-color:var(--np);}
.level-card.sel{border-color:var(--np);background:rgba(199,125,255,.09);}
.mc-icon{font-size:1.8rem;margin-bottom:8px;}
.mc-name{font-size:1rem;font-weight:900;color:#f0f0ff;}
.mc-desc{font-size:0.78rem;color:#9090cc;margin-top:4px;font-weight:700;}
.lc-name{font-size:1.05rem;font-weight:900;margin-bottom:5px;}
.lc-desc{font-size:0.8rem;color:#aaaadd;font-weight:700;}
.start-btn{display:block;width:100%;padding:18px;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,var(--nb),var(--np));color:#0d0d1a;border-radius:14px;cursor:pointer;letter-spacing:2px;transition:.15s;}
.start-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}

/* Quiz screen */
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.chapter-tag{display:inline-flex;align-items:center;background:rgba(57,255,144,.1);border:2px solid rgba(57,255,144,.4);color:var(--ng);border-radius:20px;padding:6px 16px;font-size:0.85rem;font-weight:900;}
.count-label{font-size:0.85rem;color:#aaaadd;font-weight:700;}
.progress-bar{height:4px;background:rgba(100,100,200,.2);border-radius:2px;margin-bottom:22px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--nb),var(--np));transition:width .4s ease;border-radius:2px;}
.question-card{background:var(--card);border:2px solid var(--dim);border-radius:16px;padding:26px 24px;margin-bottom:18px;}
.question-text{font-size:1.15rem;font-weight:700;line-height:1.8;color:#f0f0ff;}

/* Visual slot */
.bio-visual{display:grid;place-items:center;border-radius:12px;border:2px solid var(--dim);background:rgba(255,255,255,.03);padding:12px;margin-bottom:16px;}
.bio-visual svg{width:min(90%,300px);height:auto;}

/* Options */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.opt-btn{background:var(--card);border:2px solid rgba(160,160,220,0.3);border-radius:12px;padding:18px 16px;cursor:pointer;text-align:left;font-size:0.95rem;color:#e8e8ff;transition:.15s;font-family:inherit;line-height:1.6;font-weight:700;}
.opt-btn:not([disabled]):hover{border-color:var(--nb);color:#fff;background:rgba(0,207,255,.09);}
.opt-btn.correct{border-color:var(--ng)!important;background:rgba(57,255,144,.12)!important;color:var(--ng)!important;}
.opt-btn.wrong{border-color:var(--nr)!important;background:rgba(255,77,109,.12)!important;color:var(--nr)!important;}
.opt-btn:disabled{cursor:default;}

/* Match */
.match-board{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px;}
.match-col{display:grid;gap:10px;}
.match-col-title{font-size:0.72rem;color:#9090cc;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.match-card{background:var(--card);border:2px solid rgba(160,160,220,0.3);border-radius:12px;padding:15px 14px;cursor:pointer;text-align:left;font-size:0.88rem;color:#e8e8ff;transition:.15s;font-family:inherit;font-weight:700;}
.match-card:hover:not([disabled]){border-color:var(--nb);}
.match-card.sel{border-color:var(--ny);background:rgba(255,224,102,.1);color:var(--ny);}
.match-card.correct{border-color:var(--ng)!important;background:rgba(57,255,144,.12)!important;color:var(--ng)!important;}
.match-card.wrong{border-color:var(--nr)!important;background:rgba(255,77,109,.12)!important;color:var(--nr)!important;}
.match-card.done{opacity:.6;pointer-events:none;}
.match-card:disabled{cursor:default;}

/* Sort */
.sort-board{display:grid;gap:16px;margin-top:14px;}
.sort-zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;}
.sort-zone{background:rgba(57,255,144,.05);border:2px dashed rgba(57,255,144,.3);border-radius:12px;min-height:110px;padding:12px;text-align:left;cursor:pointer;transition:.15s;}
.sort-zone:hover{border-color:var(--nb);}
.sort-zone strong{display:block;color:var(--ng);font-size:0.82rem;margin-bottom:8px;font-weight:900;}
.sort-drop-list{display:grid;gap:6px;}
.sort-pill{background:rgba(255,255,255,.06);border:2px solid rgba(160,160,220,0.3);border-radius:20px;padding:5px 10px;font-size:0.8rem;color:#e8e8ff;font-weight:700;}
.sort-pill.correct{border-color:var(--ng);color:var(--ng);background:rgba(57,255,144,.1);}
.sort-pill.wrong{border-color:var(--nr);color:var(--nr);background:rgba(255,77,109,.1);}
.sort-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.sort-card{background:var(--card);border:2px solid rgba(160,160,220,0.3);border-radius:10px;padding:12px;font-size:0.88rem;font-weight:900;text-align:center;cursor:pointer;transition:.15s;color:#e8e8ff;font-family:inherit;}
.sort-card:hover:not(.done):not([disabled]){border-color:var(--nb);}
.sort-card.sel{border-color:var(--ny);background:rgba(255,224,102,.1);color:var(--ny);}
.sort-card.done{opacity:.35;pointer-events:none;}

/* Feature */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.feat-btn{background:var(--card);border:2px solid rgba(160,160,220,0.3);border-radius:12px;padding:15px 14px;cursor:pointer;text-align:left;font-size:0.88rem;color:#e8e8ff;transition:.15s;font-family:inherit;font-weight:700;}
.feat-btn:hover:not([disabled]){border-color:var(--nb);}
.feat-btn.sel{border-color:var(--ny);background:rgba(255,224,102,.1);color:var(--ny);}
.feat-btn.correct{border-color:var(--ng)!important;background:rgba(57,255,144,.12)!important;color:var(--ng)!important;}
.feat-btn.wrong{border-color:var(--nr)!important;background:rgba(255,77,109,.12)!important;color:var(--nr)!important;}
.feat-btn.missed{border-color:var(--ng)!important;background:rgba(57,255,144,.06)!important;color:var(--ng)!important;outline:2px dashed rgba(57,255,144,.5);outline-offset:-4px;}
.feat-btn:disabled{cursor:default;}

/* Feedback */
.feedback{border-radius:14px;border:2px solid var(--dim);padding:18px 20px;margin-top:16px;display:none;}
.feedback.show{display:block;}
.feedback.good{background:rgba(57,255,144,.09);border-color:rgba(57,255,144,.4);}
.feedback.bad{background:rgba(255,77,109,.09);border-color:rgba(255,77,109,.4);}
.fb-title{display:block;margin-bottom:8px;font-size:1rem;font-weight:900;}
.feedback.good .fb-title{color:var(--ng);}
.feedback.bad .fb-title{color:var(--nr);}
.fb-text{font-size:0.88rem;color:#ccccee;line-height:1.9;font-weight:700;}

/* Controls */
.controls{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
.primary-btn{padding:13px 26px;font-size:0.95rem;font-weight:900;background:linear-gradient(135deg,var(--nb),var(--np));color:#0d0d1a;border-radius:12px;cursor:pointer;font-family:inherit;transition:.15s;}
.primary-btn:hover{filter:brightness(1.1);}
.secondary-btn{padding:13px 26px;font-size:0.95rem;font-weight:900;background:rgba(255,255,255,.06);border:2px solid rgba(160,160,220,0.35);color:#d0d0ee;border-radius:12px;cursor:pointer;font-family:inherit;transition:.15s;}
.secondary-btn:hover{border-color:var(--np);color:var(--np);}
.submit-btn{display:inline-block;padding:13px 28px;background:rgba(57,255,144,.12);border:2px solid var(--ng);color:var(--ng);border-radius:12px;cursor:pointer;font-size:0.95rem;font-weight:900;font-family:inherit;transition:.15s;}
.submit-btn:hover{background:rgba(57,255,144,.22);}
.hidden{display:none!important;}

/* End screen */
.end-card{background:var(--card);border:2px solid var(--dim);border-radius:20px;padding:44px 34px;text-align:center;}
.end-eyebrow{font-size:0.72rem;letter-spacing:2px;color:#9090cc;text-transform:uppercase;margin-bottom:12px;font-weight:700;}
.end-score{font-size:5rem;font-weight:900;background:linear-gradient(135deg,var(--nb),var(--np));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.end-of-max{font-size:0.88rem;color:#aaaadd;margin:8px 0 16px;font-weight:700;}
.rank-badge{display:inline-block;padding:8px 28px;border-radius:30px;font-size:1.4rem;font-weight:900;letter-spacing:2px;margin-bottom:20px;}
.end-msg{font-size:1rem;color:#e0e0ff;line-height:1.8;margin-bottom:26px;font-weight:700;}
.review-list{display:grid;gap:12px;margin-top:20px;text-align:left;}
.review-item{background:rgba(255,255,255,.05);border:2px solid var(--dim);border-radius:12px;padding:16px 18px;}
.review-item strong{display:block;margin-bottom:6px;font-size:0.95rem;color:#f0f0ff;}
.review-item .ri-yours{font-size:0.82rem;color:#ff7090;margin-bottom:3px;font-weight:700;}
.review-item .ri-correct{font-size:0.82rem;color:#39ff90;margin-bottom:5px;font-weight:700;}
.review-item .ri-hint{font-size:0.82rem;color:#aaaacc;line-height:1.8;font-weight:700;}

@media(max-width:560px){
  .mode-grid,.level-grid,.options-grid,.match-board,.feature-grid{grid-template-columns:1fr;}
  .hud{gap:16px;}
  html{font-size:18px;}
}
</style>
</head>
<body>

<div class="hud">
  <div class="hi"><span class="hl">難度</span><span class="hv g" id="hud-level">—</span></div>
  <div class="hi" id="hud-time-box"><span class="hl">倒數</span><span class="hv b" id="hud-time">—</span></div>
  <div class="hi"><span class="hl">生命</span><span class="hv r" id="hud-lives">—</span></div>
  <div class="hi"><span class="hl">分數</span><span class="hv y" id="hud-score">0</span></div>
</div>

<div class="wrap">

<!-- 開始畫面 -->
<div id="start-screen" class="screen active">
  <div style="padding:24px 0 32px;">
    <div class="brand-badge">🔬 Enid 生物特訓</div>
    <div class="title-main">五界生物探險隊</div>
    <p class="title-sub">細菌、真菌、植物與動物——把分類線索一個個找回來。<br>答錯留下提示，下一輪直接補強最混淆的地方。</p>
    <div class="bio-tags">
      <span class="bio-tag">原核生物界</span><span class="bio-tag">原生生物界</span>
      <span class="bio-tag">真菌界</span><span class="bio-tag">植物界</span><span class="bio-tag">動物界</span>
    </div>
  </div>

  <div class="sec-label">選擇練習模式</div>
  <div class="mode-grid" id="mode-grid">
    <div class="mode-card sel" data-mode="choice">
      <div class="mc-icon">⚡</div><div class="mc-name">選擇題</div><div class="mc-desc">四選一判斷</div>
    </div>
    <div class="mode-card" data-mode="sort">
      <div class="mc-icon">🗂️</div><div class="mc-name">分類歸位</div><div class="mc-desc">卡片放對分類框</div>
    </div>
    <div class="mode-card" data-mode="feature">
      <div class="mc-icon">☑️</div><div class="mc-name">特徵勾選</div><div class="mc-desc">多選正確特徵</div>
    </div>
  </div>

  <div class="sec-label">選擇難度</div>
  <div class="level-grid" id="level-grid">
    <div class="level-card sel" data-level="easy">
      <div class="lc-name" style="color:var(--ng)">🌿 初級</div>
      <div class="lc-desc">10題｜30秒／題｜3心</div>
      <div class="lc-desc" style="margin-top:5px">建立五界基本感</div>
    </div>
    <div class="level-card" data-level="medium">
      <div class="lc-name" style="color:var(--nb)">⚡ 中級</div>
      <div class="lc-desc">12題｜20秒／題｜3心</div>
      <div class="lc-desc" style="margin-top:5px">加入比較與歸位</div>
    </div>
    <div class="level-card" data-level="hard">
      <div class="lc-name" style="color:var(--nr)">🔥 高級</div>
      <div class="lc-desc">15題｜10秒／題｜2心</div>
      <div class="lc-desc" style="margin-top:5px">混合限時高難度</div>
    </div>
  </div>

  <button class="start-btn" id="start-btn">開始挑戰 →</button>
</div>

<!-- 答題畫面 -->
<div id="quiz-screen" class="screen">
  <div class="quiz-meta">
    <span class="chapter-tag" id="chapter-label">章節</span>
    <span class="count-label" id="count-label">第 1 題</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="question-card">
    <div id="visual-slot"></div>
    <div class="question-text" id="question-text">題目載入中...</div>
  </div>
  <div id="answer-area"></div>
  <div id="feedback" class="feedback">
    <span class="fb-title" id="fb-title"></span>
    <div class="fb-text" id="fb-text"></div>
  </div>
  <div class="controls">
    <button class="primary-btn hidden" id="next-btn">下一題 →</button>
    <button class="secondary-btn" id="quit-btn">回到選單</button>
  </div>
</div>

<!-- 結算畫面 -->
<div id="end-screen" class="screen">
  <div class="end-card">
    <div class="end-eyebrow">本輪結算</div>
    <div class="end-score" id="end-score">0</div>
    <div class="end-of-max" id="end-max">/ 0 分</div>
    <div class="rank-badge" id="rank-badge">C</div>
    <div class="end-msg" id="end-msg">繼續加油！</div>
    <div class="controls" style="justify-content:center;">
      <button class="primary-btn" id="retry-wrong-btn">重練錯題</button>
      <button class="secondary-btn" id="restart-btn">重新選等級</button>
    </div>
    <div class="review-list" id="review-list"></div>
  </div>
</div>

</div><!-- .wrap -->

<script>
const LEVELS={
  easy:{label:"初級",count:10,seconds:30,hearts:3,maxD:1},
  medium:{label:"中級",count:12,seconds:20,hearts:3,maxD:2},
  hard:{label:"高級",count:15,seconds:10,hearts:2,maxD:3}
};

const VISUALS={
  mushroom:`<svg viewBox="0 0 220 170"><rect width="220" height="170" rx="18" fill="#0d0d1a"/><path d="M45 84c3-38 37-58 75-43 29 12 46 40 40 77H42c-2-12-1-23 3-34Z" fill="#d86f56"/><path d="M88 112h45l14 44H74l14-44Z" fill="#9b6b3a"/><circle cx="75" cy="66" r="9" fill="#fff3de" opacity=".7"/><circle cx="113" cy="55" r="7" fill="#fff3de" opacity=".7"/><circle cx="141" cy="78" r="8" fill="#fff3de" opacity=".7"/><text x="110" y="20" text-anchor="middle" fill="#39ff90" font-size="13" font-weight="800">無葉綠體、有菌絲</text></svg>`,
  fern:`<svg viewBox="0 0 220 170"><rect width="220" height="170" rx="18" fill="#0d0d1a"/><path d="M101 146C69 113 66 76 92 47c16-18 41-27 74-25-31 18-45 43-45 70 0 25-6 43-20 54Z" fill="#39ff90" opacity=".7"/><path d="M99 146c-5-53 14-95 65-124M99 111c-22-6-39-3-56 10M105 88c-20-20-38-30-58-31M119 66c-14-24-23-40-25-56" fill="none" stroke="#00cfff" stroke-width="6" stroke-linecap="round"/><text x="110" y="20" text-anchor="middle" fill="#39ff90" font-size="13" font-weight="800">有維管束、孢子繁殖</text></svg>`,
  insect:`<svg viewBox="0 0 220 170"><rect width="220" height="170" rx="18" fill="#0d0d1a"/><ellipse cx="99" cy="91" rx="43" ry="30" fill="#00cfff" opacity=".6"/><ellipse cx="149" cy="82" rx="23" ry="20" fill="#00cfff" opacity=".6"/><path d="M66 79 31 51M64 97 28 105M91 61 76 28M96 119 75 150M123 62 146 29M122 119 151 145" stroke="#c77dff" stroke-width="7" stroke-linecap="round"/><text x="110" y="20" text-anchor="middle" fill="#39ff90" font-size="13" font-weight="800">分節、外骨骼、附肢</text></svg>`,

$("mode-grid").addEventListener("click",e=>{
  const c=e.target.closest(".mode-card");if(!c)return;
  selMode=c.dataset.mode;
  document.querySelectorAll(".mode-card").forEach(x=>x.classList.remove("sel"));
  c.classList.add("sel");
});
$("level-grid").addEventListener("click",e=>{
  const c=e.target.closest(".level-card");if(!c)return;
  selLevel=c.dataset.level;
  document.querySelectorAll(".level-card").forEach(x=>x.classList.remove("sel"));
  c.classList.add("sel");
});
$("start-btn").addEventListener("click",()=>startGame(false));
els.nextBtn.addEventListener("click",()=>{qi++;renderQ();});
els.quitBtn.addEventListener("click",()=>{clearInterval(timer);document.body.classList.remove("time-alert");showScreen("startScreen");timeLeft=0;updateHUD();});
els.restartBtn.addEventListener("click",()=>{showScreen("startScreen");timeLeft=0;updateHUD();});
els.retryWrongBtn.addEventListener("click",()=>startGame(true));

function showScreen(name){
  [els.startScreen,els.quizScreen,els.endScreen].forEach(s=>s.classList.remove("active"));
  els[name].classList.add("active");
}

function ensureAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
}
function playTone(type){
  try{
    ensureAudio();
    const now=audioCtx.currentTime;
    const pairs=type==="good"?[[620,.06],[820,.06]]:type==="bad"?[[240,.06],[180,.06]]:[[880,.035]];
    pairs.forEach(([freq,vol],i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=type==="tick"?"square":"sine";
      o.frequency.setValueAtTime(freq,now+i*.08);
      g.gain.setValueAtTime(vol,now+i*.08);
      g.gain.exponentialRampToValueAtTime(.001,now+i*.08+.12);
      o.connect(g);g.connect(audioCtx.destination);
      o.start(now+i*.08);o.stop(now+i*.08+.13);
    });
  }catch(e){}
}
function flash(type){
  document.body.classList.remove("flash-good","flash-bad");
  void document.body.offsetWidth;
  document.body.classList.add(type==="good"?"flash-good":"flash-bad");
  setTimeout(()=>document.body.classList.remove("flash-good","flash-bad"),450);
}

function updateHUD(){
  const lv=LEVELS[selLevel];
  const mLabel=selMode==="choice"?"選擇":selMode==="sort"?"歸位":selMode==="feature"?"勾選":"配對";
  els.levelLabel.textContent=retryMode?`${mLabel}錯題`:`${lv.label} ${mLabel}`;
  els.timeLabel.textContent=timeLeft>0?`${timeLeft}s`:"—";
  els.heartsLabel.textContent=hearts>0?"♥".repeat(hearts)+"🖤".repeat(Math.max(0,(LEVELS[selLevel]?.hearts||3)-hearts)):"💀";
  els.scoreLabel.textContent=score;
  els.progressFill.style.width=qs.length?`${(qi/qs.length)*100}%`:"0%";
  els.timeBox.classList.toggle("time-low",timeLeft>0&&timeLeft<=5);
  document.body.classList.toggle("time-alert",timeLeft>0&&timeLeft<=5&&!locked);
}

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function pickQ(lv,mode){
  const lv0=LEVELS[lv];
  const pool=Q.filter(q=>q.type===mode&&q.d<=lv0.maxD);
  return shuffle(pool).slice(0,lv0.count);
}

function startGame(useWrong){
  ensureAudio();
  retryMode=useWrong;
  qs=useWrong?wrongLog.map(w=>w.q):pickQ(selLevel,selMode);
  qi=0;score=0;hearts=LEVELS[selLevel].hearts;wrongLog=[];
  showScreen("quizScreen");
  renderQ();
}

function startTimer(){
  clearInterval(timer);
  timeLeft=LEVELS[selLevel].seconds;
  updateHUD();
  timer=setInterval(()=>{
    timeLeft--;
    if(timeLeft>0&&timeLeft<=5)playTone("tick");
    updateHUD();
    if(timeLeft<=0)handleTimeout();
  },1000);
}

function renderQ(){
  if(qi>=qs.length||hearts<=0){finishGame();return;}
  locked=false;selLeft=null;matchState=null;sortState=null;featureState=null;
  const q=qs[qi];
  els.chapterLabel.textContent=q.ch;
  els.countLabel.textContent=`第 ${qi+1} 題 / ${qs.length}`;
  els.questionText.textContent=q.q;
  els.visualSlot.innerHTML="";
  els.answerArea.innerHTML="";
  els.feedback.className="feedback";
  els.nextBtn.classList.add("hidden");

  if(q.type==="choice"||q.type==="image"){
    if(q.type==="image"){
      const d=document.createElement("div");d.className="bio-visual";
      d.innerHTML=VISUALS[q.vis]||"";els.visualSlot.appendChild(d);
    }
    renderChoice(q);
  }else if(q.type==="match"){renderMatch(q);}
  else if(q.type==="sort"){renderSort(q);}
  else if(q.type==="feature"){renderFeature(q);}

  startTimer();updateHUD();
}

function renderChoice(q){
  const opts=shuffle(q.opts.map((l,i)=>({l,i})));
  q._opts=opts;
  const g=document.createElement("div");g.className="options-grid";
  opts.forEach((o,idx)=>{
    const b=document.createElement("button");b.className="opt-btn";b.textContent=o.l;
    b.addEventListener("click",()=>handleChoice(idx,q));
    g.appendChild(b);
  });
  els.answerArea.appendChild(g);
}
function handleChoice(idx,q){
  if(locked)return;locked=true;clearInterval(timer);
  const btns=[...els.answerArea.querySelectorAll(".opt-btn")];
  const ok=q._opts[idx].i===q.ans;
  btns.forEach((b,i)=>{b.disabled=true;if(q._opts[i].i===q.ans)b.classList.add("correct");});
  if(!ok)btns[idx].classList.add("wrong");
  if(ok){
    score+=10+Math.max(0,timeLeft);
    showFeedback("good","答對了，這題穩住了。",q.hint);
    playTone("good");flash("good");
  }else{
    hearts--;
    wrongLog.push({q,sel:q._opts[idx].l});
    showFeedback("bad",CHEERS[Math.floor(Math.random()*CHEERS.length)],`正確答案：${q.opts[q.ans]}。${q.hint}`);
    playTone("bad");flash("bad");
  }
  els.nextBtn.classList.remove("hidden");updateHUD();
}

function renderMatch(q){
  matchState={solved:0,total:q.pairs.length,map:new Map(q.pairs)};
  const left=shuffle(q.pairs.map(p=>p[0]));
  const right=shuffle(q.pairs.map(p=>p[1]));
  const board=document.createElement("div");board.className="match-board";
  const lc=document.createElement("div");lc.className="match-col";
  lc.innerHTML='<div class="match-col-title">類群／概念</div>';
  const rc=document.createElement("div");rc.className="match-col";
  rc.innerHTML='<div class="match-col-title">特徵／例子</div>';
  left.forEach(v=>{const b=mkMatchBtn(v,"left");lc.appendChild(b);});
  right.forEach(v=>{const b=mkMatchBtn(v,"right");rc.appendChild(b);});
  board.appendChild(lc);board.appendChild(rc);
  els.answerArea.appendChild(board);
}
function mkMatchBtn(v,side){
  const b=document.createElement("button");b.className="match-card";
  b.textContent=v;b.dataset.side=side;b.dataset.val=v;
  b.addEventListener("click",()=>onMatchClick(b));
  return b;
}
function onMatchClick(btn){
  if(locked||btn.classList.contains("done"))return;
  if(btn.dataset.side==="left"){
    document.querySelectorAll(".match-card[data-side='left']").forEach(b=>b.classList.remove("sel"));
    selLeft=btn;btn.classList.add("sel");return;
  }
  if(!selLeft)return;
  if(matchState.map.get(selLeft.dataset.val)===btn.dataset.val){
    [selLeft,btn].forEach(b=>{b.classList.add("correct","done");b.classList.remove("sel");b.disabled=true;});
    selLeft=null;matchState.solved++;score+=8;playTone("good");updateHUD();
    if(matchState.solved===matchState.total){
      locked=true;clearInterval(timer);
      score+=10+Math.max(0,timeLeft);
      showFeedback("good","配對完成，這組概念更清楚了。",qs[qi].hint);
      els.nextBtn.classList.remove("hidden");flash("good");updateHUD();
    }
  }else{
    [selLeft,btn].forEach(b=>b.classList.add("wrong"));
    playTone("bad");
    setTimeout(()=>{selLeft?.classList.remove("wrong","sel");btn.classList.remove("wrong");selLeft=null;},400);
  }
}

function renderSort(q){
  sortState={sel:null,placed:new Map(),rendered:shuffle(q.items.map((it,i)=>({...it,i})))};
  const board=document.createElement("div");board.className="sort-board";
  const zones=document.createElement("div");zones.className="sort-zones";
  q.cats.forEach(cat=>{
    const z=document.createElement("div");z.className="sort-zone";z.dataset.cat=cat;
    z.innerHTML=`<strong>${cat}</strong><div class="sort-drop-list"></div>`;
    z.addEventListener("click",()=>placeCard(z,q));
    zones.appendChild(z);
  });
  const items=document.createElement("div");items.className="sort-items";
  sortState.rendered.forEach((it,idx)=>{
    const b=document.createElement("button");b.className="sort-card";b.textContent=it.t;b.dataset.idx=idx;
    b.addEventListener("click",()=>{
      if(locked||b.classList.contains("done"))return;
      sortState.sel=idx;
      document.querySelectorAll(".sort-card").forEach(c=>c.classList.remove("sel"));
      b.classList.add("sel");
    });
    items.appendChild(b);
  });
  board.appendChild(zones);board.appendChild(items);
  els.answerArea.appendChild(board);
  const sub=document.createElement("button");sub.className="submit-btn";sub.textContent="提交分類 →";
  sub.addEventListener("click",()=>handleSort(false,q));
  els.answerArea.appendChild(sub);
}
function placeCard(zone,q){
  if(locked||sortState.sel===null)return;
  const idx=sortState.sel;
  const it=sortState.rendered[idx];
  const card=els.answerArea.querySelector(`.sort-card[data-idx="${idx}"]`);
  if(!card||card.classList.contains("done"))return;
  const pill=document.createElement("div");pill.className="sort-pill";
  pill.textContent=it.t;pill.dataset.idx=idx;pill.dataset.cat=zone.dataset.cat;
  zone.querySelector(".sort-drop-list").appendChild(pill);
  sortState.placed.set(idx,zone.dataset.cat);
  card.classList.add("done","sel");card.disabled=true;sortState.sel=null;updateHUD();
}
function handleSort(timedOut,q){
  if(locked)return;locked=true;clearInterval(timer);
  let wrong=0,missed=0;
  const pills=[...els.answerArea.querySelectorAll(".sort-pill")];
  sortState.rendered.forEach((it,idx)=>{
    const placed=sortState.placed.get(idx);
    if(!placed){missed++;return;}
    const pill=pills.find(p=>Number(p.dataset.idx)===idx);
    if(placed===it.c)pill?.classList.add("correct");
    else{wrong++;pill?.classList.add("wrong");}
  });
  const ok=!timedOut&&wrong===0&&missed===0;
  if(ok){
    score+=10+Math.max(0,timeLeft);
    showFeedback("good","全部歸位正確，分類很清楚。",q.hint);
    playTone("good");flash("good");
  }else{
    hearts--;
    const ans=q.items.map(it=>`${it.t}→${it.c}`).join("；");
    wrongLog.push({q,sel:timedOut?"時間到未完成":`放錯${wrong}張，未放${missed}張`});
    showFeedback("bad",timedOut?"時間到，現在補起來。":CHEERS[Math.floor(Math.random()*CHEERS.length)],`正確：${ans}。${q.hint}`);
    playTone("bad");flash("bad");
  }
  els.nextBtn.classList.remove("hidden");updateHUD();
}

function renderFeature(q){
  featureState={sel:new Set(),rendered:shuffle(q.features.map((f,i)=>({...f,i})))};
  const g=document.createElement("div");g.className="feature-grid";
  featureState.rendered.forEach((f,idx)=>{
    const b=document.createElement("button");b.className="feat-btn";b.textContent=f.t;b.dataset.idx=idx;
    b.addEventListener("click",()=>{
      if(locked)return;
      if(featureState.sel.has(idx)){featureState.sel.delete(idx);b.classList.remove("sel");}
      else{featureState.sel.add(idx);b.classList.add("sel");}
    });
    g.appendChild(b);
  });
  els.answerArea.appendChild(g);
  const sub=document.createElement("button");sub.className="submit-btn";sub.textContent="提交勾選 →";
  sub.addEventListener("click",()=>handleFeature(false,q));
  els.answerArea.appendChild(sub);
}
function handleFeature(timedOut,q){
  if(locked)return;locked=true;clearInterval(timer);
  let hasWrong=false,hasMissed=false;
  const btns=[...els.answerArea.querySelectorAll(".feat-btn")];
  const picks=[];
  featureState.rendered.forEach((f,idx)=>{
    const sel=featureState.sel.has(idx);
    const btn=btns[idx];btn.disabled=true;
    if(sel)picks.push(f.t);
    if(f.ok&&sel)btn.classList.add("correct");
    if(!f.ok&&sel){hasWrong=true;btn.classList.add("wrong");}
    if(f.ok&&!sel){hasMissed=true;btn.classList.add("missed");}
  });
  const ok=!timedOut&&!hasWrong&&!hasMissed;
  if(ok){
    score+=10+Math.max(0,timeLeft);
    showFeedback("good","選得很準，這組特徵抓到了。",q.hint);
    playTone("good");flash("good");
  }else{
    hearts--;
    const correct=q.features.filter(f=>f.ok).map(f=>f.t).join("、");
    wrongLog.push({q,sel:picks.length?picks.join("、"):"未勾選"});
    showFeedback("bad",timedOut?"時間到，現在補起來。":CHEERS[Math.floor(Math.random()*CHEERS.length)],`正確特徵：${correct}。${q.hint}`);
    playTone("bad");flash("bad");
  }
  els.nextBtn.classList.remove("hidden");updateHUD();
}

function handleTimeout(){
  if(locked)return;
  const q=qs[qi];
  if(q.type==="sort"){locked=false;handleSort(true,q);}
  else if(q.type==="feature"){locked=false;handleFeature(true,q);}
  else if(q.type==="match"){
    locked=true;clearInterval(timer);
    hearts--;
    wrongLog.push({q,sel:"未完成配對"});
    showFeedback("bad","時間到，現在補起來。",q.hint);
    els.nextBtn.classList.remove("hidden");playTone("bad");flash("bad");updateHUD();
  }else{
    locked=true;clearInterval(timer);
    const btns=[...els.answerArea.querySelectorAll(".opt-btn")];
    btns.forEach((b,i)=>{b.disabled=true;if(q._opts[i].i===q.ans)b.classList.add("correct");});
    hearts--;
    wrongLog.push({q,sel:"未作答"});
    showFeedback("bad","時間到，現在補起來。",`正確答案：${q.opts[q.ans]}。${q.hint}`);
    els.nextBtn.classList.remove("hidden");playTone("bad");flash("bad");updateHUD();
  }
}

function showFeedback(type,title,text){
  els.feedback.className=`feedback ${type} show`;
  els.fbTitle.textContent=title;
  els.fbText.textContent=text;
}

function finishGame(){
  clearInterval(timer);document.body.classList.remove("time-alert");
  showScreen("endScreen");
  const pct=qs.length?score/(qs.length*10):0;
  let rank,rc,msg;
  if(pct>=.9){rank="SSR";rc="#ffe066";msg="完美作答！你是五界生物分類大師！";}
  else if(pct>=.7){rank="A";rc="#00cfff";msg="表現優秀！再多練習一次就能達到SSR！";}
  else if(pct>=.5){rank="B";rc="#39ff90";msg="有點基礎了！繼續把易混淆的地方補強吧。";}
  else{rank="C";rc="#c77dff";msg="沒關係，看看錯題提示再戰！";}
  els.endScore.textContent=score;
  els.endMax.textContent=`/ ${qs.length*10} 分（基礎）`;
  els.rankBadge.textContent=rank;
  els.rankBadge.style.cssText=`background:rgba(0,0,0,.2);border:2px solid ${rc};color:${rc};display:inline-block;padding:8px 28px;border-radius:30px;font-size:1.4rem;font-weight:900;letter-spacing:2px;margin-bottom:20px;`;
  els.endMsg.textContent=msg;
  els.retryWrongBtn.classList.toggle("hidden",wrongLog.length===0);
  renderReview();updateHUD();
}
function renderReview(){
  els.reviewList.innerHTML="";
  if(wrongLog.length===0){
    els.reviewList.innerHTML='<div class="review-item"><strong style="color:var(--ng)">沒有錯題！</strong><div class="ri-hint">可以挑戰更高難度，或重新來一輪加強速度。</div></div>';
    return;
  }
  wrongLog.forEach((entry,i)=>{
    const q=entry.q;
    let correctAns;
    if(q.type==="match")correctAns="完成全部正確配對";
    else if(q.type==="sort")correctAns="把所有卡片放入正確分類框";
    else if(q.type==="feature")correctAns=q.features.filter(f=>f.ok).map(f=>f.t).join("、");
    else correctAns=q.opts[q.ans];
    const d=document.createElement("div");d.className="review-item";
    d.innerHTML=`<strong>${i+1}. ${q.q}</strong><div class="ri-yours">你的答案：${entry.sel}</div><div class="ri-correct">正確答案：${correctAns}</div><div class="ri-hint">${q.hint}</div>`;
    els.reviewList.appendChild(d);
  });
}

updateHUD();
</script>
</body>
</html>
